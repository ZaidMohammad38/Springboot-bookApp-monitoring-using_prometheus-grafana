---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-bookApp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-bookApp
  template:
    metadata:
      labels:
        app: spring-bookApp
    spec:
      containers:
        - name: spring-bookApp
          image: zaidmohammad038/bookapp_monitoring_system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_APPLICATION_NAME
              value: Springboot-bookApp
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-service:3306/myapplication?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"

---
apiVersion: v1
kind: Service
metadata:
  name: spring-bookApp-service
spec:
  type: NodePort
  selector:
    app: spring-bookApp
  ports:
    - name: http
      port: 8085
      targetPort: 8085
      nodePort: 30085
