<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body class="container mt-4">

<h2>Add Book</h2>

<form th:action="@{/save}" th:object="${book}" method="post">

    <input type="text" th:field="*{title}" placeholder="Title"/>
    <p th:if="${#fields.hasErrors('title')}" th:text="${#fields.errors('title')}"></p>

    <input type="text" th:field="*{author}" placeholder="Author"/>
    <p th:if="${#fields.hasErrors('author')}" th:text="${#fields.errors('author')}"></p>

    <input type="number" step="0.01" th:field="*{price}" placeholder="Price"/>
    <p th:if="${#fields.hasErrors('price')}" th:text="${#fields.errors('price')}"></p>

    <button type="submit">Save</button>
</form>

</body>
</html>
